<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30天编程挑战题目列表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .search-bar {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .search-bar:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .filter-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: transparent;
            color: #667eea;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .filter-btn:hover, .filter-btn.active {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        /* 类别筛选样式 */
        .category-container {
            margin: 30px 0;
        }

        .category-container h3 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .category-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .category-btn {
            padding: 8px 16px;
            border: 1px solid #dee2e6;
            border-radius: 20px;
            background: #f8f9fa;
            color: #495057;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .category-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .question-list {
            display: grid;
            gap: 20px;
        }

        .question-card {
            background: white;
            border-radius: 10px;
            padding: 15px 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            border-left: 5px solid #667eea;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .question-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .question-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-right: auto;
        }

        .question-title {
            font-size: 1rem;
            font-weight: 600;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 300px;
        }

        .difficulty {
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .difficulty.HARD {
            background: #ff6b6b;
            color: white;
        }

        .difficulty.MEDIUM {
            background: #ffd93d;
            color: #333;
        }

        .difficulty.EASY {
            background: #6bcb77;
            color: white;
        }

        .question-tags {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-right: 15px;
        }

        .tag {
            background: #e9ecef;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: #495057;
            border: 1px solid #dee2e6;
        }

        .stats {
            display: flex;
            gap: 15px;
            font-size: 0.8rem;
            color: #6c757d;
            margin-right: 15px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .favorite {
            color: #ff6b6b;
            font-weight: bold;
        }

        .no-results {
            text-align: center;
            padding: 50px;
            color: #6c757d;
            font-size: 1.2rem;
        }

        .leetcode-btn {
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .leetcode-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2rem;
            }

            .question-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .question-header {
                width: 100%;
                justify-content: space-between;
            }

            .question-title {
                max-width: 200px;
            }
        }
    </style>
</head>

        allCategoryButton.dataset.category = 'all';
        categoryButtonsContainer.appendChild(allCategoryButton);
        
        // 为每个类别创建按钮
        categories.forEach(category => {
            const button = document.createElement('button');
            button.className = 'category-btn';
            button.textContent = category;
            button.dataset.category = category;
            categoryButtonsContainer.appendChild(button);
        });
        
        // 获取所有类别按钮
        const categoryBtns = document.querySelectorAll('.category-btn');
        
        // 统一的筛选函数
        function applyFilters() {
            filteredData = data.filter(question => {
                // 搜索筛选
                const matchesSearch = 
                    question.translatedTitle.toLowerCase().includes(searchTerm) ||
                    question.title.toLowerCase().includes(searchTerm) ||
                    question.topicTags.some(tag => tag.nameTranslated.toLowerCase().includes(searchTerm));
                
                // 难度筛选
                const matchesDifficulty = selectedDifficulty === 'all' || question.difficulty === selectedDifficulty;
                
                // 类别筛选
                const matchesCategory = selectedCategory === 'all' || 
                    question.topicTags.some(tag => tag.nameTranslated === selectedCategory);
                
                // 同时满足所有筛选条件
                return matchesSearch && matchesDifficulty && matchesCategory;
            });
            renderQuestions(filteredData);
        }
        
        // 渲染题目列表
        function renderQuestions(questions) {
            if (questions.length === 0) {
                questionList.innerHTML = '<div class="no-results">没有找到匹配的题目</div>';
                return;
            }
            
            questionList.innerHTML = questions.map(question => `
                <div class="question-card">
                    <div class="question-header">
                        <div class="question-title">${question.translatedTitle}</div>
                        <div class="difficulty ${question.difficulty}">${question.difficulty}</div>
                    </div>
                    <div class="question-tags">
                        ${question.topicTags.map(tag => `<span class="tag">${tag.nameTranslated}</span>`).join('')}
                    </div>
                    <div class="stats">
                        <div class="stat-item">
                            <span>通过率:</span>
                            <span>${(question.acRate * 100).toFixed(1)}%</span>
                        </div>
                        <div class="stat-item">
                            <span>频率:</span>
                            <span>${question.frequency}%</span>
                        </div>
                    </div>
                    <a href="https://leetcode.cn/problems/${question.titleSlug}" target="_blank" class="leetcode-btn">
                        去做题
                    </a>
                </div>
            `).join('');
        }
        
        // 搜索功能
        searchBar.addEventListener('input', (e) => {
            searchTerm = e.target.value.toLowerCase();
            applyFilters();
        });
        
        // 难度筛选功能
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // 更新按钮状态
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                selectedDifficulty = btn.dataset.filter;
                applyFilters();
            });
        });
        
        // 类别筛选功能
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // 更新按钮状态
                categoryBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                selectedCategory = btn.dataset.category;
                applyFilters();
            });
        });
        
        // 初始渲染
        renderQuestions(data);
    </script>
</body>
</html>
